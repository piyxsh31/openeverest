---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: backups.backup.openeverest.io
spec:
  group: backup.openeverest.io
  names:
    kind: Backup
    listKind: BackupList
    plural: backups
    shortNames:
    - bk
    - bak
    singular: backup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.instanceName
      name: Instance
      type: string
    - jsonPath: .spec.storageName
      name: Storage
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Backup is the Schema for the backups API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BackupSpec defines the desired state of Backup.
            properties:
              backupClassName:
                description: |-
                  BackupClassName is the BackupClass that defines how this Backup is
                  executed. The class's executionMode controls the runtime path: Job
                  classes are reconciled by the in-cluster Backup job controller;
                  ProviderManaged classes are reconciled by the provider's runtime.
                type: string
              config:
                description: |-
                  Config is the backup-time configuration validated against the
                  BackupClass's .spec.config.openAPIV3Schema.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              deletionPolicy:
                allOf:
                - enum:
                  - Retain
                  - Delete
                - enum:
                  - Retain
                  - Delete
                default: Delete
                description: |-
                  DeletionPolicy controls what happens to the underlying backup data
                  (e.g., the object stored in S3) when this Backup CR is deleted.
                  Delete (default) instructs the provider to remove both the
                  engine-native backup resource and the data in the configured
                  BackupStorage. Retain instructs the provider to remove the
                  engine-native backup resource but to leave the underlying data in
                  place, so it can be recovered later out-of-band.

                  The field is mutable on a live Backup but is frozen once deletion
                  has started: switching policies after .metadata.deletionTimestamp
                  has been set is rejected so the cleanup path cannot race with
                  itself.
                type: string
              instanceName:
                description: |-
                  InstanceName is the name of the Instance to back up. The Instance must
                  live in the same namespace as this Backup.
                type: string
              scheduleName:
                description: |-
                  ScheduleName, when set, identifies the InstanceBackupSchedule that
                  produced this Backup. Backups created via the API or `kubectl apply`
                  leave this field empty (on-demand). The provider's mirroring loop
                  sets it when surfacing operator-produced scheduled backups as Backup
                  CRs.
                type: string
              storageName:
                description: |-
                  StorageName references a BackupStorage in the same namespace that
                  defines where the backup data is written. For ProviderManaged classes
                  the referenced storage must already be registered on the Instance via
                  .spec.backup.storages so the engine can write to it.
                type: string
            required:
            - backupClassName
            - instanceName
            - storageName
            type: object
          status:
            description: BackupStatus defines the observed state of Backup.
            properties:
              completedAt:
                description: CompletedAt is the time when the backup completed successfully.
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              executionMode:
                description: |-
                  ExecutionMode is the resolved execution mode at the time the Backup
                  started. Recorded for observability.
                enum:
                - ProviderManaged
                - Job
                type: string
              jobName:
                description: |-
                  JobName is the reference to the Job that is running the backup.
                  Populated only for Job classes.
                type: string
              lastObservedGeneration:
                description: LastObservedGeneration is the last observed generation
                  of the Backup CR.
                format: int64
                type: integer
              message:
                description: Message is a human-readable message about the current
                  state.
                type: string
              operatorBackupRef:
                description: |-
                  OperatorBackupRef points at the operator-native backup resource the
                  provider created (e.g., PerconaServerMongoDBBackup). Populated only
                  for ProviderManaged classes.
                properties:
                  apiGroup:
                    description: |-
                      APIGroup is the group for the resource being referenced.
                      If APIGroup is not specified, the specified Kind must be in the core API group.
                      For any other third-party types, APIGroup is required.
                    type: string
                  kind:
                    description: Kind is the type of resource being referenced
                    type: string
                  name:
                    description: Name is the name of resource being referenced
                    type: string
                required:
                - kind
                - name
                type: object
                x-kubernetes-map-type: atomic
              size:
                description: Size is the size of the backup data as reported by the
                  engine.
                type: string
              startedAt:
                description: StartedAt is the time when the backup started.
                format: date-time
                type: string
              state:
                description: State is the current state of the backup.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
