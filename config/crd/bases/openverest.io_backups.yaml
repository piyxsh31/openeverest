              instanceName:
                description: InstanceName is the name of the Instance to back up.
                type: string
            required:
            - backupClassName
            - destination
            - instanceName
            type: object
          status:
            description: BackupStatus defines the observed state of Backup.
            properties:
              completedAt:
                description: CompletedAt is the time when the backup job completed
                  successfully.
                format: date-time
                type: string
              jobName:
                description: JobName is the reference to the job that is running the
                  backup.
                type: string
              lastObservedGeneration:
                description: LastObservedGeneration is the last observed generation
                  of the backup job.
                format: int64
                type: integer
              message:
                description: Message is the message of the backup job.
                type: string
              startedAt:
                description: StartedAt is the time when the backup job started.
                format: date-time
                type: string
              state:
                description: State is the current state of the backup job.
                type: string
            type: object
