apiVersion: kuttl.dev/v1
kind: TestSuite
artifactsDir: /tmp/
startKIND: false
skipDelete: false
skipClusterDelete: true
commands:
  - command: sh -c "kubectl get namespace everest-monitoring || kubectl create namespace everest-monitoring"
  # Apply VictoriaMetrics Operator CRD
  - command: kubectl apply -f https://raw.githubusercontent.com/VictoriaMetrics/operator/v${VICTORIAMETRICS_OPERATOR_VERSION}/config/crd/overlay/crd.yaml
  - command: kubectl wait --for condition=established --timeout=10s crd vmagents.operator.victoriametrics.com
  # Deploy with test overlay.
  - command: kubectl apply -k config/test
    # Restart to pick the latest image (in case it was rebuilt).
  - command: kubectl delete pod -n openeverest-system -l control-plane=controller-manager
    # Wait for Controller to be ready.
  - command: kubectl wait --for=condition=available --timeout=30s deploy/openeverest-controller-manager -n openeverest-system
testDirs:
  - test/integration/monitoring
